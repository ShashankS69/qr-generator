<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI QR Code Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 UPI QR Generator</h1>
            <p>Generate secure UPI payment QR codes instantly</p>
        </div>

        <div class="content">
            <div class="input-section">
                <h2>Create Your QR Code</h2>
                
                <div class="form-group">
                    <label for="upi">UPI ID</label>
                    <input type="text" id="upi" placeholder="example@upi" required>
                    <small>Enter your UPI ID (e.g., name@bank)</small>
                </div>

                <div class="form-group">
                    <label for="name">Recipient Name</label>
                    <input type="text" id="name" placeholder="Your Name" required>
                    <small>The name to display in payment apps</small>
                </div>

                <div class="form-group">
                    <label for="amount">Amount (Optional)</label>
                    <input type="number" id="amount" placeholder="100" min="0" step="0.01">
                    <small>Leave blank for no fixed amount</small>
                </div>

                <button class="btn-generate" onclick="generateQR()">Generate QR Code</button>
            </div>

            <div class="output-section">
                <div id="qrcode" class="qr-display"></div>
                <button class="btn-download" onclick="downloadQR()" style="margin-top: 20px; display: none;" id="downloadBtn">Download QR Code</button>
            </div>
        </div>

        <div class="footer-info">
            <p>✨ Fast • Secure • Free • No Login Required</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
